name: Update WordPress.org assets

# Syncs the plugin-listing assets (icon, banner, screenshots) and readme.txt to
# WordPress.org WITHOUT cutting a release — useful for swapping a banner or
# fixing readme copy between versions. Auto-runs only when the listing assets
# change on main; also available on demand from the Actions tab /
# `gh workflow run` (use that for a readme-only copy fix between releases).
#
# readme.txt is deliberately NOT an auto-trigger path: a release push bumps
# readme.txt alongside code, and the 10up asset action refuses to deploy when
# trunk has non-asset/non-readme code changes ("Other files have been
# modified") — so on every release this workflow failed harmlessly but noisily.
# The tagged deploy syncs readme.txt as part of the release anyway, and a
# readme-only fix can still be pushed via workflow_dispatch.
#
# It builds the Vue admin app FIRST. trunk already contains the compiled
# assets/admin/ (committed by the deploy workflow), but that directory is
# gitignored — so a bare checkout looks like it deletes app.js/app.css, and the
# 10up action aborts with "Other files have been modified; changes not
# deployed". Rebuilding it restores parity with trunk, so only the genuine
# asset/readme changes are committed.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.wordpress-org/**'

jobs:
  assets:
    name: Push assets & readme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build admin UI (so trunk's gitignored assets/admin isn't seen as deleted)
        run: |
          npm ci
          npm run build

      - name: Update assets on WordPress.org
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: agentimus
