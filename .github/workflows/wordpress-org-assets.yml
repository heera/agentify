name: Update WordPress.org assets

# Syncs the plugin-listing assets (icon, banner, screenshots) and readme.txt to
# WordPress.org WITHOUT cutting a release — useful for swapping a banner or
# fixing readme copy between versions.
#
# MANUAL-ONLY (workflow_dispatch). The push auto-trigger was intentionally
# REMOVED: the 10up asset action does a full SVN checkout and refuses to deploy
# when trunk has non-asset/non-readme code changes ("Other files have been
# modified"). During a release the new code lives on GitHub but reaches SVN
# trunk only via the tagged deploy, so a release push (which bundles code +
# screenshots) ALWAYS tripped that abort — a harmless but permanent red ✗ on
# the head commit, recurring on every screenshot-bearing release. The tagged
# deploy (deploy.yml) already publishes listing assets + readme on every release
# via ASSETS_DIR, so nothing is lost by dropping the auto-trigger. Run this by
# hand only for a between-release asset/readme tweak (when repo code already
# matches SVN trunk, so the abort won't fire):
#   gh workflow run wordpress-org-assets.yml
#
# It builds the Vue admin app FIRST (see below) for the same parity reason.
#
# It builds the Vue admin app FIRST. trunk already contains the compiled
# assets/admin/ (committed by the deploy workflow), but that directory is
# gitignored — so a bare checkout looks like it deletes app.js/app.css, and the
# 10up action aborts with "Other files have been modified; changes not
# deployed". Rebuilding it restores parity with trunk, so only the genuine
# asset/readme changes are committed.

on:
  workflow_dispatch:

jobs:
  assets:
    name: Push assets & readme
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build admin UI (so trunk's gitignored assets/admin isn't seen as deleted)
        run: |
          npm ci
          npm run build

      - name: Update assets on WordPress.org
        uses: 10up/action-wordpress-plugin-asset-update@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: agentimus
